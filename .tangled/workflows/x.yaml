when:
  - event: ["push"]
    branch: ["master"]

engine: tack

tack:
  tekton:
    pipeline: xe-x-build-test
    service_account: default
    workspaces:
      - name: repo
        access_modes: ["ReadWriteOnce"]
        storage: 4Gi
      - name: go-mod-cache
        pvc: go-mod-cache
      - name: dockerconfig-ghcr
        secret: ghcr
