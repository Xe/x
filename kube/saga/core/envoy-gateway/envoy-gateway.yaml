apiVersion: helm.cattle.io/v1
kind: HelmChart
metadata:
  name: eg
  namespace: kube-system
spec:
  chart: oci://docker.io/envoyproxy/gateway-helm
  version: v0.0.0-latest
  targetNamespace: envoy-gateway-system
  createNamespace: true
  takeOwnership: true
  valuesContent: |-
    deployment:
      pod:
        nodeSelector:
          role: edge
        tolerations:
          - key: dedicated
            operator: Equal
            value: edge
            effect: NoSchedule
