apiVersion: apps/v1
kind: Deployment
metadata:
  name: external-dns
  namespace: external-dns
spec:
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: external-dns
  template:
    metadata:
      labels:
        app: external-dns
    spec:
      serviceAccountName: external-dns
      nodeSelector:
        role: edge
      tolerations:
        - key: dedicated
          operator: Equal
          value: edge
          effect: NoSchedule
      containers:
        - name: crd
          image: registry.k8s.io/external-dns/external-dns:v0.21.0
          args:
            - --source=crd
            - --crd-source-apiversion=externaldns.k8s.io/v1alpha1
            - --crd-source-kind=DNSEndpoint
            - --source=ingress
            - --default-targets=saga.xeserv.us
            - --force-default-targets
            # - --source=gateway-httproute
            # - --source=gateway-grpcroute
            - --provider=aws
            - --registry=dynamodb
            - --dynamodb-region=ca-central-1
            - --dynamodb-table=external-dns-saga-crd
            - --managed-record-types=TXT
            - --managed-record-types=A
            - --managed-record-types=AAAA
            - --managed-record-types=CNAME
          env:
            - name: AWS_REGION
              value: us-east-1
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: aws-creds
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: aws-creds
                  key: AWS_SECRET_ACCESS_KEY
