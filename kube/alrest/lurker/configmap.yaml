apiVersion: v1
kind: ConfigMap
metadata:
  name: lurker
data:
  NODE_ENV: production
  PORT: "8015"
  DATABASE_PATH: /app/data/lurker.db
  # Passkeys (WebAuthn) — must match the public origin browsers hit.
  WEBAUTHN_RP_ID: lurker.cetacean.club
  WEBAUTHN_RP_NAME: Lurker
  WEBAUTHN_ORIGIN: https://lurker.cetacean.club
  # Served over true end-to-end HTTPS (nginx ingress + cert-manager).
  COOKIE_SECURE: "true"
  # Web push notifications — valid mailto: with a real multi-label domain.
  VAPID_SUBJECT: mailto:me@xeiaso.net
  # Embedded in outbound User-Agent and CTCP VERSION replies.
  USER_AGENT_CONTACT: https://xeiaso.net/contact/
