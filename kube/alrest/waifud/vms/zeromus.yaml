apiVersion: cdi.kubevirt.io/v1beta1
kind: DataVolume
metadata:
  name: "zeromus"
  namespace: waifud
spec:
  storage:
    storageClassName: longhorn
    volumeMode: Filesystem # or filesystem
    accessModes:
      - ReadWriteOnce # Necessary as it's no longer has a default
    resources:
      requests:
        storage: 32Gi
  source:
    http:
      url: "https://geo.mirror.pkgbuild.com/images/latest/Arch-Linux-x86_64-cloudimg.qcow2"
---
apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  labels:
    kubevirt.io/os: linux
  name: "zeromus"
  namespace: waifud
spec:
  running: true
  template:
    metadata:
      creationTimestamp: null
      labels:
        kubevirt.io/domain: "zeromus"
    spec:
      domain:
        cpu:
          cores: 2
        devices:
          disks:
            - disk:
                bus: virtio
              name: disk0
            - cdrom:
                bus: sata
                readonly: true
              name: cloudinitdisk
        machine:
          type: q35
        resources:
          requests:
            memory: 1024M
      volumes:
        - name: disk0
          persistentVolumeClaim:
            claimName: "zeromus"
        - cloudInitNoCloud:
            userData: |
              #cloud-config
              hostname: zeromus
              ssh_pwauth: True
              disable_root: false

              users:
                - name: xe
                  groups: [ wheel ]
                  sudo: [ "ALL=(ALL) NOPASSWD:ALL" ]
                  shell: /bin/bash
                  ssh-authorized-keys:
                    - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIF6/+q2dBHEfETomAH7rvDPXHulSXnhcV/szxTAWiKZA cadey@defoko
                    - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIJIH27tCTJZwJxp+bcWRALtrk7SqnwXZ4/Ae67jIO0eF cadey@shiroko
          name: cloudinitdisk
