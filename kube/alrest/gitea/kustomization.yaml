resources:
  - namespace.yaml
  - 1password.yaml
  - cnpg.yaml
  - gitea-config.yaml
  - gitea-custom-files.yaml
  - deployment.yaml
  - onionservice.yaml
  - service.yaml
  - runner.yaml
  #- external-dns.yaml
  - ingress.yaml
  - valkey-anubis.yaml
  - valkey-gitea.yaml
  - pvc.yaml
namespace: gitea

configMapGenerator:
  - name: anubis-cfg
    behavior: create
    files:
      - ./cfg/anubis/botPolicies.yaml

  - name: botstopper-custom-css
    behavior: create
    files:
      - ./cfg/botstopper/custom.css

  - name: gitea-runner-cfg
    behavior: create
    files:
      - ./cfg/runner/config.yaml
