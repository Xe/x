apiVersion: monitoring.coreos.com/v1
kind: Alertmanager
metadata:
  name: alerts
spec:
  replicas: 3
---
apiVersion: v1
kind: Service
metadata:
  name: alertmanager-example
spec:
  type: NodePort
  ports:
    - name: web
      nodePort: 30903
      port: 9093
      protocol: TCP
      targetPort: web
  selector:
    alertmanager: alerts
