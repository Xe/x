# One wildcard cert per apex domain actually in use in this cluster
# (cross-checked against every Ingress host), each backed by its own
# cert-manager Certificate/secret and served by the matching listener in
# gateway.yaml. Domains we own in Route53 but don't yet serve anything from
# are intentionally left out - add a Certificate + listener together when a
# domain gets its first service.
#
# Wildcards only match one label deep, so a nested subdomain (e.g.
# xena.greedo.xeserv.us, two labels under xeserv.us) needs its own "*."
# SAN/listener/cert at that level too - the parent domain's wildcard won't
# cover it.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: wildcard-cetacean-club
  namespace: envoy-gateway-system
spec:
  secretName: wildcard-cetacean-club-tls

  duration: 2160h # 90d
  renewBefore: 360h # 15d

  usages:
    - digital signature
    - key encipherment
  dnsNames:
    - cetacean.club
    - "*.cetacean.club"
  issuerRef:
    name: "letsencrypt-prod"
    kind: ClusterIssuer
    group: cert-manager.io
---
