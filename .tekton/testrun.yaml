apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  generateName: x-m-
  namespace: ci

spec:
  params:
    - name: commit
      value: master
    - name: branch
      value: master
    - name: actor
      value: did:plc:e5nncb3dr5thdkjir5cfaqfe
  pipelineRef:
    name: xe-x-build-test
  taskRunTemplate:
    serviceAccountName: default
  timeouts:
    pipeline: 1h0m0s
  workspaces:
    - name: repo
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 4Gi
    - name: go-mod-cache
      persistentVolumeClaim:
        claimName: go-mod-cache
    - name: dockerconfig-ghcr
      secret:
        secretName: ghcr
